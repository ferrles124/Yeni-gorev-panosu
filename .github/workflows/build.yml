name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
        
    - name: Create fake game folder
      run: |
        mkdir -p $HOME/stardew
        touch "$HOME/stardew/Stardew Valley.exe"
        touch "$HOME/stardew/StardewValley.dll"
        touch "$HOME/stardew/StardewValley.GameData.dll"
        touch "$HOME/stardew/StardewModdingAPI.dll"
        touch "$HOME/stardew/MonoGame.Framework.dll"
        touch "$HOME/stardew/xTile.dll"

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./LuuaGorevPanosu
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      working-directory: ./LuuaGorevPanosu
      env:
        SMAPI_GAME_PATH: $HOME/stardew
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LuuaGorevPanosu
        path: ./LuuaGorevPanosu/bin/Release/net6.0/
